name = "sigma-etl"
main = "src/index.ts"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8789

[[d1_databases]]
binding = "DB"
database_name = "sigma"
database_id = "00000000-0000-0000-0000-000000000000"

[[r2_buckets]]
binding = "RAW"
bucket_name = "sigma-raw"

[triggers]
crons = ["0 */6 * * *"]
